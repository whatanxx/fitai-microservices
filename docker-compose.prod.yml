version: '3.8'

services:
  # Base database service
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fitai-network

  # Backend Services
  user-service:
    image: ${GCP_REGISTRY}/user-service:latest
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
    networks:
      - fitai-network

  workout-service:
    image: ${GCP_REGISTRY}/workout-service:latest
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      - postgres
    networks:
      - fitai-network

  ai-coach-service:
    image: ${GCP_REGISTRY}/ai-coach-service:latest
    restart: always
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WORKOUT_SERVICE_URL=http://workout-service:8002
      - USER_SERVICE_URL=http://user-service:8001
    depends_on:
      - postgres
    networks:
      - fitai-network

  # Frontend served via Nginx (Reverse Proxy)
  frontend:
    image: ${GCP_REGISTRY}/frontend:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - user-service
      - workout-service
      - ai-coach-service
    networks:
      - fitai-network

networks:
  fitai-network:
    driver: bridge

volumes:
  postgres_data:
