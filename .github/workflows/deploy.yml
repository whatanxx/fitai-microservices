name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: gen-lang-client-0145356180 # Twój ID projektu
  REGION: us-central1
  REPO_NAME: fitai-repo

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: 'projects/911534372370/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-deploy@gen-lang-client-0145356180.iam.gserviceaccount.com'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'

      # 1. User Service
      - name: Build and Deploy User Service
        run: |
          gcloud builds submit --project=${{ env.PROJECT_ID }} --tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/user-service:latest --timeout=15m ./services/user-service --logging=cloud_logging
          gcloud run deploy user-service --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/user-service:latest \
            --project=${{ env.PROJECT_ID }} --region ${{ env.REGION }} --add-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:fitai-instance \
            --set-env-vars "DATABASE_URL=postgresql+psycopg2://postgres:${{ secrets.DB_PASSWORD }}@/fitai_db?host=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:fitai-instance,JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --port 8001 --quiet

      # 2. Workout Service
      - name: Build and Deploy Workout Service
        run: |
          gcloud builds submit --project=${{ env.PROJECT_ID }} --tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/workout-service:latest --timeout=15m ./services/workout-service --logging=cloud_logging
          gcloud run deploy workout-service --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/workout-service:latest \
            --project=${{ env.PROJECT_ID }} --region ${{ env.REGION }} --add-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:fitai-instance \
            --set-env-vars "DATABASE_URL=postgresql+asyncpg://postgres:${{ secrets.DB_PASSWORD }}@/fitai_db?host=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:fitai-instance" \
            --port 8002 --quiet

      # 3. AI Coach Service
      - name: Build and Deploy AI Coach Service
        run: |
          gcloud builds submit --project=${{ env.PROJECT_ID }} --tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/ai-coach-service:latest --timeout=15m ./services/ai-coach-service --logging=cloud_logging
          gcloud run deploy ai-coach-service --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/ai-coach-service:latest \
            --project=${{ env.PROJECT_ID }} --region ${{ env.REGION }} --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},USER_SERVICE_URL=https://user-service-911534372370.us-central1.run.app,WORKOUT_SERVICE_URL=https://workout-service-911534372370.us-central1.run.app,GCP_PROJECT=${{ env.PROJECT_ID }},GCP_LOCATION=${{ env.REGION }}" \
            --port 8003 --quiet

      # 4. Frontend
      - name: Build and Deploy Frontend
        run: |
          cat <<EOF > ./frontend/cloudbuild_ci.yaml
          steps:
          - name: 'gcr.io/cloud-builders/docker'
            args: ['build', '-t', '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend:latest', '-f', 'Dockerfile.prod', '.']
          images:
          - '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend:latest'
          EOF
          gcloud builds submit --project=${{ env.PROJECT_ID }} --config ./frontend/cloudbuild_ci.yaml --timeout=20m ./frontend --logging=cloud_logging
          gcloud run deploy frontend --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend:latest \
            --project=${{ env.PROJECT_ID }} --region ${{ env.REGION }} --port 8080 --quiet
