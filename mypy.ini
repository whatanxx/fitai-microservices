[mypy]
python_version = 3.11
# Ignorujemy kolizje nazw w mikroserwisach poprzez traktowanie ich jako osobne bazy
explicit_package_bases = True
namespace_packages = True

# Wykluczamy sprawdzanie wszystkich serwisów naraz, jeśli powodują konflikty
# Zamiast tego zaleca się uruchamianie: mypy services/user-service itd.
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-alembic.*]
ignore_missing_imports = True

[mypy-jose.*]
ignore_missing_imports = True

[mypy-passlib.*]
ignore_missing_imports = True
